name: Release UIMarkerEditor

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  PUBLISH_DIR: ${{ github.workspace }}/artifacts/release

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Validate release tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
              throw "Release tag '$tag' must use the vMAJOR.MINOR.PATCH format."
          }

          "RELEASE_VERSION=$($Matches.version)" >> $env:GITHUB_ENV

      - name: Restore dependencies
        run: dotnet restore FFXIVConfigEditor.sln --disable-parallel -m:1

      - name: Check repository text formats
        run: dotnet run --project tools/TextFormatGuard -- check

      - name: Run tests
        run: dotnet test FFXIVConfigEditor.sln --configuration Release --no-restore -m:1 -p:UseSharedCompilation=false

      - name: Restore release runtime
        run: dotnet restore UIMarkerEditor/UIMarkerEditor.csproj -p:RuntimeIdentifier=win-x86 --disable-parallel -m:1

      - name: Publish single-file executable
        shell: pwsh
        run: |
          dotnet publish UIMarkerEditor/UIMarkerEditor.csproj `
              --configuration Release `
              --no-restore `
              --output "$env:PUBLISH_DIR" `
              -p:PublishProfile=ReleaseSingleFile `
              "-p:Version=$env:RELEASE_VERSION" `
              "-p:VersionPrefix=$env:RELEASE_VERSION" `
              "-p:FileVersion=$env:RELEASE_VERSION.0" `
              "-p:AssemblyVersion=$env:RELEASE_VERSION.0" `
              "-p:InformationalVersion=$env:RELEASE_VERSION" `
              -p:DebugSymbols=false `
              -p:DebugType=None `
              -p:UseSharedCompilation=false `
              -m:1

      - name: Verify release artifact
        shell: pwsh
        run: |
          $expectedName = "UIMarkerEditor.exe"
          $executable = Join-Path $env:PUBLISH_DIR $expectedName
          if (-not (Test-Path -LiteralPath $executable -PathType Leaf)) {
              throw "Published executable was not found: $executable"
          }

          $unexpectedEntries = @(
              Get-ChildItem -LiteralPath $env:PUBLISH_DIR |
                  Where-Object Name -ne $expectedName
          )
          if ($unexpectedEntries.Count -gt 0) {
              $names = ($unexpectedEntries.Name | Sort-Object) -join ", "
              throw "Single-file publish produced unexpected entries: $names"
          }

          $hash = Get-FileHash -LiteralPath $executable -Algorithm SHA256
          "$($hash.Hash)  $expectedName" |
              Set-Content -LiteralPath "$executable.sha256" -Encoding ascii

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $assets = @(
              (Join-Path $env:PUBLISH_DIR "UIMarkerEditor.exe"),
              (Join-Path $env:PUBLISH_DIR "UIMarkerEditor.exe.sha256")
          )

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
              gh release upload $tag @assets `
                  --clobber `
                  --repo $env:GITHUB_REPOSITORY
          }
          else {
              gh release create $tag @assets `
                  --verify-tag `
                  --generate-notes `
                  --title "UIMarkerEditor $tag" `
                  --repo $env:GITHUB_REPOSITORY
          }

          if ($LASTEXITCODE -ne 0) {
              throw "GitHub release operation failed with exit code $LASTEXITCODE."
          }
